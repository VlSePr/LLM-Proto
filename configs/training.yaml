# Default training config
# Override any field via CLI flags: --batch_size 64 --peak_lr 3e-4

# --- Data ---
dataset_name: HuggingFaceFW/fineweb-edu
dataset_subset: sample-10BT
data_dir: data
tokenizer_path: tokenizer_data

# --- Optimization ---
batch_size: 32
gradient_accumulation_steps: 4
max_steps: 50000
warmup_steps: 2000

# Learning rate
peak_lr: 6.0e-04
min_lr: 6.0e-05
weight_decay: 0.1

# Adam
adam_beta1: 0.9
adam_beta2: 0.95
adam_eps: 1.0e-08

# Gradient clipping
max_grad_norm: 1.0

# --- Mixed precision ---
precision: auto       # auto | bf16 | fp16 | fp32

# --- Checkpointing ---
checkpoint_dir: checkpoints
save_every_steps: 500
keep_last_n_checkpoints: 5

# --- Google Drive backup ---
backup_to_gdrive: false
gdrive_folder_id: ''              # Target folder ID from Drive URL
gdrive_credentials_path: ''       # Path to service-account JSON (empty = default creds)
gdrive_cleanup_remote: true       # Mirror keep_last_n on remote

# --- Logging ---
log_every_steps: 10
eval_every_steps: 500
generate_every_steps: 1000
visualize_every_steps: 1000

# --- Wandb ---
wandb_project: llm-proto
wandb_run_name: ''
use_wandb: true

# --- Performance ---
num_workers: 4
use_compile: auto     # auto | true | false
gradient_checkpointing: false

# --- Reproducibility ---
seed: 42

# --- Resume ---
resume: ''            # '' | latest | best | step_N

# --- Sample prompts ---
sample_prompts:
  - 'The meaning of life is'
  - 'In the year 2050, artificial intelligence'
  - 'Once upon a time in a land far away'
  - 'The theory of relativity explains'
